<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Edit - Redesigned Grid</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Cormorant Garamond', 'Playfair Display', Georgia, serif;
        background-color: #f5f3f0;
        color: #1a1a1a;
      }

      /* The Edit Section */
      .the-edit {
        max-width: 1400px;
        margin: 0 auto;
        padding: 80px 40px;
      }

      .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 40px;
      }

      .section-title {
        font-size: 24px;
        font-weight: 400;
        font-style: italic;
        letter-spacing: 0.5px;
      }

      .view-all {
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 2px;
        color: #666;
        text-decoration: none;
        transition: color 0.3s ease;
      }

      .view-all:hover {
        color: #1a1a1a;
      }

      /* 
         * REDESIGNED GRID LAYOUT
         * Bento-style grid that preserves image aspect ratios
         */
      .edit-grid {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        grid-template-rows: repeat(2, 350px);
        gap: 16px;
      }

      .edit-item {
        position: relative;
        background-color: #eae8e5;
        border-radius: 4px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* 
         * CRITICAL: Use object-fit: contain to preserve image aspect ratio
         * This ensures images are NEVER cropped or stretched
         */
      .edit-item img {
        width: 100%;
        height: 100%;
        object-fit: contain; /* Preserves true aspect ratio */
        display: block;
        transition: transform 0.6s ease;
      }

      .edit-item:hover img {
        transform: scale(1.02);
      }

      /* 
         * Grid Positioning for 4 images
         * Balanced bento layout with proper spacing
         */
      .edit-item:nth-child(1) {
        /* Woman by pool - landscape image */
        grid-column: 1 / 6;
        grid-row: 1 / 3;
      }

      .edit-item:nth-child(2) {
        /* Woman walking - portrait image */
        grid-column: 6 / 9;
        grid-row: 1 / 3;
      }

      .edit-item:nth-child(3) {
        /* Woman in car - portrait image */
        grid-column: 9 / 13;
        grid-row: 1 / 2;
      }

      .edit-item:nth-child(4) {
        /* Close-up with ring - portrait image */
        grid-column: 9 / 13;
        grid-row: 2 / 3;
      }

      /* Alternative Layout Option 2: 2x2 Grid */
      .edit-grid-alt-2x2 {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(2, 500px);
        gap: 16px;
        display: none; /* Hidden by default, toggle via JS or remove this line to use */
      }

      .edit-grid-alt-2x2 .edit-item {
        grid-column: auto !important;
        grid-row: auto !important;
      }

      /* Alternative Layout Option 3: Asymmetric with larger featured image */
      .edit-grid-alt-featured {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(2, 320px);
        gap: 16px;
        display: none; /* Hidden by default */
      }

      .edit-grid-alt-featured .edit-item:nth-child(1) {
        grid-column: 1 / 2;
        grid-row: 1 / 3;
      }

      .edit-grid-alt-featured .edit-item:nth-child(2) {
        grid-column: 2 / 3;
        grid-row: 1 / 3;
      }

      .edit-grid-alt-featured .edit-item:nth-child(3) {
        grid-column: 3 / 4;
        grid-row: 1 / 2;
      }

      .edit-grid-alt-featured .edit-item:nth-child(4) {
        grid-column: 3 / 4;
        grid-row: 2 / 3;
      }

      /* Join Section */
      .join-section {
        text-align: center;
        padding: 80px 40px;
        border-top: 1px solid #ddd;
        margin-top: 40px;
      }

      .join-title {
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 3px;
        margin-bottom: 16px;
      }

      .join-link {
        font-size: 12px;
        color: #666;
        text-decoration: none;
        border-bottom: 1px solid #666;
        padding-bottom: 2px;
        transition: all 0.3s ease;
      }

      .join-link:hover {
        color: #1a1a1a;
        border-color: #1a1a1a;
      }

      /* Responsive */
      @media (max-width: 1024px) {
        .edit-grid {
          grid-template-columns: repeat(2, 1fr);
          grid-template-rows: repeat(2, 400px);
        }

        .edit-item:nth-child(1) {
          grid-column: 1 / 2;
          grid-row: 1 / 2;
        }

        .edit-item:nth-child(2) {
          grid-column: 2 / 3;
          grid-row: 1 / 2;
        }

        .edit-item:nth-child(3) {
          grid-column: 1 / 2;
          grid-row: 2 / 3;
        }

        .edit-item:nth-child(4) {
          grid-column: 2 / 3;
          grid-row: 2 / 3;
        }
      }

      @media (max-width: 640px) {
        .the-edit {
          padding: 60px 20px;
        }

        .edit-grid {
          grid-template-columns: 1fr;
          grid-template-rows: repeat(4, 400px);
        }

        .edit-item:nth-child(n) {
          grid-column: 1 / 2;
          grid-row: auto;
        }
      }

      /* Layout Toggle (for demonstration) */
      .layout-toggle {
        display: flex;
        gap: 12px;
        margin-bottom: 30px;
        justify-content: center;
      }

      .layout-btn {
        padding: 8px 16px;
        border: 1px solid #ddd;
        background: transparent;
        cursor: pointer;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s ease;
      }

      .layout-btn:hover,
      .layout-btn.active {
        background: #1a1a1a;
        color: #fff;
        border-color: #1a1a1a;
      }
    </style>
  </head>
  <body>
    <section class="the-edit">
      <div class="section-header">
        <h2 class="section-title">The Edit</h2>
        <a href="#" class="view-all">View All</a>
      </div>

      <!-- Layout Toggle for Demo -->
      <div class="layout-toggle">
        <button class="layout-btn active" onclick="switchLayout('bento')">
          Bento Grid (Recommended)
        </button>
        <button class="layout-btn" onclick="switchLayout('2x2')">
          2x2 Grid
        </button>
        <button class="layout-btn" onclick="switchLayout('featured')">
          Featured Layout
        </button>
      </div>

      <!-- 
            GRID LAYOUT OPTIONS
            All use object-fit: contain to preserve image aspect ratios
        -->
      <div class="edit-grid" id="editGrid">
        <div class="edit-item">
          <img src="LUV2531826/pool_lounger.jpg" alt="Woman relaxing by pool" />
        </div>
        <div class="edit-item">
          <img src="LUV2531822/woman_walking.jpg" alt="Woman walking in city" />
        </div>
        <div class="edit-item">
          <img src="LUV2531830/woman_car.jpg" alt="Woman in car" />
        </div>
        <div class="edit-item">
          <img src="LUV2531827/closeup_ring.jpg" alt="Close up with ring" />
        </div>
      </div>
    </section>

    <section class="join-section">
      <h3 class="join-title">Join the Haus</h3>
      <a href="#" class="join-link">Learn More</a>
    </section>

    <script>
      // Layout switcher for demonstration
      function switchLayout(layout) {
        const grid = document.getElementById('editGrid');
        const buttons = document.querySelectorAll('.layout-btn');

        buttons.forEach((btn) => btn.classList.remove('active'));
        event.target.classList.add('active');

        // Reset classes
        grid.className = 'edit-grid';

        switch (layout) {
          case '2x2':
            grid.classList.add('edit-grid-alt-2x2');
            grid.style.display = 'grid';
            break;
          case 'featured':
            grid.classList.add('edit-grid-alt-featured');
            grid.style.display = 'grid';
            break;
          default:
            // Default bento layout
            grid.style.display = 'grid';
        }
      }
    </script>
  </body>
</html>
